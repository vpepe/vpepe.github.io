<title>Valerio's Senior Quote(s)</title>

<body>
<h2>I couldn't decide on a quote for my yearbook, and made this so I could use them all.</h2>
<h2>Refresh for a new one!</h2>
<h1 id="quote"></h1>
<p id="author"></p>
<div class="footer"><h6>By Valerio Pepe | 22pepval@sssrome.it</h6></div>
</body>

<script>
    const quotes = [
                 ["Don't let school get in the way of your education",'Edward Steinberg'],
                 ['If the sun were made of hamsters, the Earth would be incinerated','Michael Schumacher'],
                 ["Hell isn't a fire pit, but a museum of regrets","Alex McKechnie, 'The Fifth Science'"],
                 ["So it goes",'Kurt Vonnegut'],
                 ["That doesn't how boats is","Matt Gray"],
                 ['Is the word "heterological" autological?','Douglas R. Hofstadter, "Gödel, Escher, Bach"'],
                 ["L'acaro ride perché il mondo è una polveriera",'Caparezza, "Gli Insetti Del Podere"'],
                 ['I honestly believe that, sometimes, my genius generates gravity','Jeremy Clarkson'],
                 ['The circle of hatred continues unless we react','Rage Against The Machine, "Take The Power Back"'],
                 ['I am the beast I worship','Death Grips, "Beware"']
                 ];
  
  Array.prototype.sample = function(){
    return this[Math.floor(Math.random()*this.length)];
  }
  
  var quote_combo = quotes.sample();
  document.getElementById("quote").innerHTML = quote_combo[0];
  document.getElementById("author").innerHTML = "-".concat(quote_combo[1]);
</script>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.1/jquery.min.js">
  function randomNumber(max){
    return Math.floor(Math.random()*max);
  }
  
  function rn(){
   return randomNumber(256); 
  }
  
  $(body).css("background", "linear-gradient(45deg, #d0d2ff 0%,  #d0fffd 46%, #fffdd0 100%)");
</script>

<p id="author"></p>

<script>
    const quotes = [
                 ["Don't let school get in the way of your education",'Edward Steinberg'],
                 ['The plural of regex is regrets','Unknown'],
                 ['If the sun were made of hamsters, the Earth would be incinerated','Michael Schumacher (context unknown)'],
                 ["Hell isn't a fire pit, but a museum of regrets","Exurb1a, 'The Fifth Science'"],
                 ["This too shall pass",'Traditional'],
                 ["That doesn't how boats is","Matt Gray"],
                 ['How do I take off a mask when it stops being a mask, when it’s as much a part of me as I am?','Elliot Alderson, "Mr. Robot"'],
                 ['Is the word "non-autodescriptive" autodescriptive?','Douglas R. Hofstadter, "Gödel, Escher, Bach"'],
                 ["I'm two and three-quarter cans of Monster in; I can smell colors",'Michael Reeves (Also Valerio Pepe during the essay-writing process)'],
                 ["If we don't believe in freedom of speech for people we despise, we don't believe in it at all",'Noam Chomsky'],
                 ["L'acaro ride perché il mondo è una polveriera",'Caparezza, "Gli Insetti Del Podere"'],
                 ["Dall'uovo si fa presto ad arrivare alla guerra atomica",'Bruno Fioretti, "Febbre da cavallo"'],
                 ['I am stupid','Charles Leclerc'],
                 ['Sinistrosus ut labefacias, Dextrorsus ut manefacias','Engineers'],
                 ['Si sa che non tutti i mali vengono per nuocere, non tutti i sali vengono per cuocere','Daniele Silvestri'],
                 ['Two gin-scented tears trickled down the side of his nose [...] He loved the IB','George Orwell, "Nineteen Eighty-Four" (adapted)']
                 ];
  
  Array.prototype.sample = function(){
    return this[Math.floor(Math.random()*this.length)];
  }
  
  var quote_combo = quotes.sample();
  document.getElementById("quote").innerHTML = quote_combo[0];
  document.getElementById("author").innerHTML = "-".concat(quote_combo[1]);
</script>

<link rel="stylesheet" type="text/css" href="main.css">

<style>
  body {
  background: rgb(rgbnum(),rgbnum(),rgbnum());
  background: linear-gradient(315deg, rgb(rgbnum(),rgbnum(),rgbnum()) 0%, rgb(rgbnum(),rgbnum(),rgbnum()) 50%, rgb(rgbnum(),rgbnum(),rgbnum()) 100%);
}
</style>

<body>
<h1 id="quote"></h1>
<p id="author"></p>
</body>

<script>
  const quotes = [['quote1','author1'],
                 ['quote2','author2'],
                 ['quote3','author3'],
                 ['quote4','author4'],
                 ['quote5','author5']];
  
  Array.prototype.sample = function(){
    return this[Math.floor(Math.random()*this.length)];
  }
  
  function rgbnum() {
  min = Math.ceil(0);
  max = Math.floor(256);
  return Math.floor(Math.random() * (max - min + 1)) + min; 
}

  var quote_combo = quotes.sample();
  document.getElementById("quote").innerHTML = quote_combo[0];
  document.getElementById("author").innerHTML = quote_combo[1];
</script>
